name: Orbiton Test Suite — 151 Individual Tests

on:
  push:
    branches: ['*']
  pull_request:
    branches: ['*']

jobs:
  discover-tests:
    runs-on: ubuntu-latest
    outputs:
      tests: ${{ steps.discover.outputs.tests }}
    steps:
    - uses: actions/checkout@v4
    - id: discover
      run: |
        # Find all test files and build a JSON matrix
        tests=$(find tests -name "test_*.py" | jq -R -s -c 'split("\n")[:-1]')
        echo "tests=$tests" >> $GITHUB_OUTPUT

  run-tests:
    needs: discover-tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        test-file: ${{ fromJson(needs.discover-tests.outputs.tests) }}
        os: [ubuntu-latest]
        include:
        - test-file: tests/launch/test_clipboard.py
          os: windows-latest
        - test-file: tests/launch/test_exam_mode.py
          os: windows-latest
        - test-file: tests/launch/test_file_search.py
          os: windows-latest
        - test-file: tests/launch/test_folder_navigation.py
          os: windows-latest
        - test-file: tests/launch/test_latest_file.py
          os: windows-latest
        - test-file: tests/launch/test_open_folders.py
          os: windows-latest
        - test-file: tests/launch/test_project_launch.py
          os: windows-latest
        - test-file: tests/launch/test_script_launch.py
          os: windows-latest
    name: ${{ matrix.test-file }}
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.13'
    - run: pip install pytest speechrecognition rich
    - run: pytest "${{ matrix.test-file }}" -v --tb=short