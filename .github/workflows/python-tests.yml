name: Orbiton Test Suite

on:
  push:
    branches: ['*']
  pull_request:
    branches: ['*']

jobs:
  # ─── Individual test categories ───────────────────────────
  test-compute:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.13'
    - run: pip install pytest speechrecognition rich
    - run: pytest tests/compute/ -v --tb=short

  test-core-logic:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.13'
    - run: pip install pytest speechrecognition rich
    - run: pytest tests/core_logic/ -v --tb=short

  test-integration:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.13'
    - run: pip install pytest speechrecognition rich
    - run: pytest tests/integration/ -v --tb=short

  test-launch:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.13'
    - run: pip install pytest speechrecognition rich
    - run: pytest tests/launch/ -v --tb=short

  test-system:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.13'
    - run: pip install pytest speechrecognition rich
    - run: pytest tests/system/ -v --tb=short

  test-url-engine:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.13'
    - run: pip install pytest speechrecognition rich
    - run: pytest tests/url_engine/ -v --tb=short

  # ─── Per-test-file granularity (optional, for 151 separate statuses) ─
  # Uncomment below if you want EACH test file as its own check run:
  #
  # test-compute-advanced-math:
  #   runs-on: ubuntu-latest
  #   steps:
  #   - uses: actions/checkout@v4
  #   - uses: actions/setup-python@v5
  #     with: { python-version: '3.13' }
  #   - run: pip install pytest speechrecognition rich
  #   - run: pytest tests/compute/test_advanced_math.py -v --tb=short
  #
  # ... repeat for each of the 37 test files