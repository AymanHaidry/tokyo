name: Pylint

on:
  push:
    branches: ['*']
  pull_request:
    branches: ['*']

jobs:
  pylint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pylint
        pip install -r requirements.txt

    - name: Analyse code with pylint
      run: |
        pylint kosmosic_orbiton.py neuro_link_intel.py tests/ --fail-under=8.4 --disable=R,C

    - name: Pylint Score
      run: |
        echo "========================================"
        echo "  PYLINT SCORE REPORT"
        echo "========================================"
        pylint kosmosic_orbiton.py neuro_link_intel.py tests/ --disable=R,C --output-format=text | tail -5 || true
        SCORE=$(pylint kosmosic_orbiton.py neuro_link_intel.py tests/ --disable=R,C --output-format=json 2>/dev/null | python -c "import sys,json; data=json.load(sys.stdin); print(round(sum(d['message'].get('score',0) for d in data if 'score' in str(d))/max(len(data),1),2))" 2>/dev/null || echo "N/A")
        echo ""
        echo "📊 Pylint Score: $SCORE"
        echo "========================================"
      shell: bash